##################
## Window Rules ##
##################
windowrulev2 = float, class:(Calculator)
windowrulev2 = size 350 600, class:(Calculator)

windowrulev2 = float, class:(pavucontrol)
windowrulev2 = size 800 600, class:(pavucontrol)

windowrulev2 = float, class:(nm-connection-editor)
windowrulev2 = size 800 600, class:(nm-connection-editor)

windowrulev2 = float, class:(xdg-desktop-portal-gtk)
windowrulev2 = size 800 500, class:(xdg-desktop-portal-gtk)

windowrulev2 = float, class:(org.prismlauncher.PrismLauncher), title:(Console window for*)
windowrulev2 = size 1065 650, class:(org.prismlauncher.PrismLauncher), title:(Console window for*)

windowrulev2 = float, title:(Picture in picture)
windowrulev2 = size 400 225, title:(Picture in picture)
windowrulev2 = pin, title:(Picture in picture)
windowrulev2 = move 70%, title:(Picture in picture)

windowrulev2 = float, class:(zen-beta), title:(Picture-in-Picture)
windowrulev2 = size 400 225, class:(zen-beta), title:(Picture-in-Picture)
windowrulev2 = pin, class:(zen-beta), title:(Picture-in-Picture)
windowrulev2 = move 70%, class:(zen-beta), title:(Picture-in-Picture)

windowrulev2 = float,class:(clipse)
windowrulev2 = size 600 350,class:(clipse) 

windowrulev2 = float, class:(hyprland-share-picker)
windowrulev2 = size 500 290, class:(hyprland-share-picker)

# Applied to all windows
# Disable shadow on inactive windows
windowrulev2 = noshadow, focus:0
# Ignore maximize requests from apps.
windowrulev2 = suppressevent maximize, class:.*
# Fix some dragging issues with XWayland
windowrulev2 = nofocus,class:^$,title:^$,xwayland:1,floating:1,fullscreen:0,pinned:0

#####################
## Workspace Rules ##
#####################
workspace = 1, monitor:eDP-1
workspace = 2, monitor:eDP-1
workspace = 3, monitor:eDP-1
workspace = 4, monitor:eDP-1
workspace = 5, monitor:eDP-1
workspace = 6, monitor:eDP-1
workspace = 7, monitor:HDMI-A-1
workspace = 8, monitor:HDMI-A-1
workspace = 9, monitor:HDMI-A-1

#########################################
##    Windows and Workspaces rules     ##
######################################### 
# Smart gap 
windowrulev2 = bordersize 0, floating:0, onworkspace:w[tv1]
windowrulev2 = rounding 0, floating:0, onworkspace:w[tv1]
windowrulev2 = bordersize 0, floating:0, onworkspace:f[1]
windowrulev2 = rounding 0, floating:0, onworkspace:f[1]
workspace = w[tv1], gapsout:0, gapsin:0
workspace = f[1], gapsout:0, gapsin:0

